<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="24" cy="24" r="24" fill="#06240f" opacity="0.1"/>
  
  <!-- Leaf pattern forming a 'G' -->
  <g id="leaf-logo">
    <!-- Top left curve of G -->
    <path d="M 16 24 Q 16 14 24 14 Q 32 14 32 22" 
          fill="none" 
          stroke="#00e887" 
          stroke-width="3.5" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
    
    <!-- Bottom part of G -->
    <path d="M 32 22 L 32 32 Q 32 34 30 34 L 20 34" 
          fill="none" 
          stroke="#00e887" 
          stroke-width="3.5" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
    
    <!-- Inner bar of G -->
    <line x1="20" y1="28" x2="28" y2="28" 
          stroke="#00e887" 
          stroke-width="3.5" 
          stroke-linecap="round"/>
    
    <!-- Decorative leaf accent top right -->
    <path d="M 34 12 Q 38 14 37 20 Q 36 16 40 18" 
          fill="none" 
          stroke="#00e887" 
          stroke-width="2" 
          stroke-linecap="round" 
          opacity="0.7"/>
    
    <!-- Decorative leaf accent bottom right -->
    <path d="M 36 32 Q 40 34 39 38 Q 38 34 42 36" 
          fill="none" 
          stroke="#00e887" 
          stroke-width="2" 
          stroke-linecap="round" 
          opacity="0.7"/>
  </g>
  
  <!-- Subtle glow effect -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="24" cy="24" r="24" 
          fill="none" 
          stroke="#00e887" 
          stroke-width="0.5" 
          opacity="0.3"
          filter="url(#glow)"/>
</svg>